# =============================================================================
# Codemagic CI/CD — Mac 없이 iOS 빌드·서명·TestFlight 업로드
# 문서: docs/ios-release.md (활성화 절차 · 채워야 할 값)
#
# 동작 원리:
#   Linux/Windows에서 코드를 GitHub에 push → Codemagic 클라우드 macOS(M2)가
#   flutter build ipa로 컴파일 + 자동 코드사이닝 + App Store Connect 업로드.
#   내 Mac은 0대 필요. (개인 무료 500분/월 macOS)
#
# 활성화 전 준비(전부 Codemagic UI/웹, Mac 불필요):
#   1) App Store Connect → Users and Access → Integrations → App Store Connect API 키 발급(Admin/App Manager)
#   2) Codemagic → Teams/Personal → Integrations → App Store Connect 에 그 키 등록
#      → 아래 `app_store_connect:` 값(<ASC_API_KEY_NAME>)을 등록한 키 이름과 일치시킴
#   3) App Store Connect에서 앱 레코드 생성(Bundle ID: kr.jigeum.jigeum)
#      → 생성된 숫자 Apple ID 를 아래 APP_STORE_APPLE_ID 에 기입
# =============================================================================

workflows:
  ios-testflight:
    name: iOS · TestFlight 배포
    max_build_duration: 60
    instance_type: mac_mini_m2          # 무료 500분/월 대상 머신
    working_directory: app              # Flutter 프로젝트가 모노레포의 app/ 안에 있음

    integrations:
      # ↓ Codemagic UI에 등록한 App Store Connect API 키 "이름"과 정확히 일치해야 함
      #   (secrets/appstore/credentials.env 의 CODEMAGIC_KEY_NAME 과 동일한 이름 사용)
      app_store_connect: jigeum_appstore_key

    environment:
      # 코드사이닝은 아래 scripts에서 app-store-connect fetch-signing-files --create 로
      # 인증서·프로필을 "없으면 생성"한다. (자동 ios_signing 블록은 기존 프로필이 있어야만
      # 동작해 첫 빌드에서 "No matching profiles found"로 실패 → 명시적 생성 방식으로 전환)
      flutter: 3.44.6                   # 로컬과 동일 버전 고정(재현성)
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "kr.jigeum.jigeum"
        # App Store Connect 앱 레코드의 숫자 Apple ID (앱: job_works / kr.jigeum.jigeum)
        APP_STORE_APPLE_ID: 6790293137

    scripts:
      - name: 배포 인증서·프로비저닝 프로필 생성/가져오기
        script: |
          # integrations.app_store_connect(jigeum_appstore_key)가 ASC 자격증명을 주입.
          # 첫 빌드라 배포 인증서 자체가 없음 → 인증서 생성엔 RSA 개인키가 필요.
          # (없으면 "Cannot save Signing Certificates without certificate private key" 실패)
          openssl genrsa -out /tmp/dist_key.pem 2048
          # --certificate-key: 이 개인키로 배포 인증서를 새로 만들고, 프로필(--create)도 생성
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_key.pem \
            --create

      - name: 키체인 초기화 + 인증서 등록
        script: |
          keychain initialize
          keychain add-certificates

      - name: Xcode 프로젝트에 서명 프로필 적용
        script: xcode-project use-profiles

      - name: Flutter 패키지 설치
        script: flutter pub get

      - name: CocoaPods 설치
        script: find . -name "Podfile" -execdir pod install \;

      - name: IPA 빌드 (+ 빌드번호 자동 증가)
        script: |
          # TestFlight의 최신 빌드번호 +1 로 자동 증가 (충돌 방지)
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          BUILD_NUMBER=$(( LATEST + 1 ))
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true      # 내부 테스터에게 배포
        # submit_to_app_store: false    # 실제 스토어 심사 자동제출은 준비되면 켜기
